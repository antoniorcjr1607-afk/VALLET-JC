<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valet — Avisar Saída</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
:root{--bg:#0a0a0a;--surface:#141414;--border:#2a2a2a;--accent:#f0c040;--green:#50c878;--text:#e8e8e8;--text2:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 32px;max-width:360px;width:100%;text-align:center}
.logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:32px}
.num{font-family:'DM Mono',monospace;font-size:72px;font-weight:500;color:var(--accent);line-height:1;margin-bottom:8px}
.num-label{font-size:13px;color:var(--text2);margin-bottom:40px}
.btn{width:100%;padding:18px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.btn:hover{background:#f5d060;transform:translateY(-1px)}
.btn:disabled{background:var(--border);color:var(--text2);cursor:not-allowed;transform:none}
.success{display:none;flex-direction:column;align-items:center;gap:16px}
.check{width:72px;height:72px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;animation:pop .4s ease;margin:0 auto}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.success h2{font-size:22px;font-weight:600}
.success p{font-size:14px;color:var(--text2);line-height:1.7;max-width:280px}
.success .brand{font-size:12px;color:var(--accent);font-family:'DM Mono',monospace;margin-top:4px}
.err{background:#2a0a0a;border:1px solid #e05050;border-radius:8px;padding:14px;font-size:13px;color:#e05050;margin-top:16px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo" id="brand">⬡ VALET</div>
  <div id="form-area">
    <div class="num" id="num-display">—</div>
    <div class="num-label">Número do seu cartão</div>
    <button class="btn" id="btn-avisar" onclick="avisar()">🚗 Avisar que estou saindo</button>
    <div class="err" id="err"></div>
  </div>
  <div class="success" id="success-area">
    <div class="check">✓</div>
    <h2>Aviso enviado!</h2>
    <p id="thanks-msg">Seu carro já está sendo buscado. Em instantes estará pronto na saída.</p>
    <div class="brand" id="brand2">— VALET</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjm-spHoSbPUJ62SYl_pJHdgoPzKscOAM",
  authDomain: "vallet-jc.firebaseapp.com",
  databaseURL: "https://vallet-jc-default-rtdb.firebaseio.com",
  projectId: "vallet-jc",
  storageBucket: "vallet-jc.firebasestorage.app",
  messagingSenderId: "352393701022",
  appId: "1:352393701022:web:02b3054f2be395c6bf7d8f"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

var params = new URLSearchParams(window.location.search);
var num    = params.get('n') || '?';
var evento = params.get('e') ? decodeURIComponent(params.get('e')) : 'Valet Pro';
var thanks = params.get('t') ? decodeURIComponent(params.get('t')) : 'Seu carro já está sendo buscado. Em instantes estará pronto na saída.';

document.getElementById('num-display').textContent = '#' + num;
document.getElementById('brand').textContent  = '⬡ ' + evento.toUpperCase();
document.getElementById('brand2').textContent = '— ' + evento;
document.getElementById('thanks-msg').textContent = thanks;

window.avisar = async function(){
  var btn = document.getElementById('btn-avisar');
  var err = document.getElementById('err');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  err.style.display = 'none';
  try {
    await push(ref(db, 'chamadas'), {
      num: num,
      evento: evento,
      time: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
      ts: Date.now()
    });
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('success-area').style.display = 'flex';
  } catch(e) {
    err.textContent = 'Erro ao enviar. Verifique sua internet e tente novamente.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '🚗 Avisar que estou saindo';
  }
}
</script>
</body>
</html>
